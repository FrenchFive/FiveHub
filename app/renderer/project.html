<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src file:; font-src 'self'" />
  <title>FIVEHUB — PROJECT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="bar">
      <button class="btn" id="back" title="Back to all projects" data-icon="chevron-left">PROJECTS</button>
      <input type="text" id="search" placeholder="Search assets & shots" style="flex:1; max-width: 320px" />
      <div class="spacer"></div>
      <div class="label" id="counts"></div>
    </header>
    <main class="content">
      <div class="stack">
        <div class="row" id="title-row"></div>
        <section class="panel">
          <div class="panel-head">
            <div class="seg" id="browse-tab" role="tablist">
              <button class="seg-item" data-tab="assets" role="tab" data-icon="box">ASSETS</button>
              <button class="seg-item" data-tab="shots" role="tab" data-icon="clapperboard">SHOTS</button>
              <button class="seg-item" data-tab="refs" role="tab" data-icon="image">REFERENCES</button>
            </div>
            <button class="btn small" id="add-asset" data-icon="plus">NEW ASSET</button>
            <button class="btn small hidden" id="add-shot" data-icon="plus">NEW SHOT</button>
            <button class="btn small hidden" id="add-refs" data-icon="plus">ADD IMAGES & FILES</button>
            <span class="spacer"></span>
            <span class="label" id="browse-count"></span>
          </div>
          <div id="assets" class="entity-list"></div>
          <div id="shots" class="entity-list hidden"></div>
          <div id="refs" class="hidden"></div>
        </section>
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title" data-icon="cpu">RENDER JOBS</div>
          </div>
          <div id="jobs"></div>
        </section>
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title" data-icon="activity">ACTIVITY</div>
          </div>
          <div id="activity"></div>
        </section>
      </div>
    </main>
    <footer class="bar">
      <div class="mono" id="project-path"></div>
    </footer>
  </div>
  <script src="common.js"></script>
  <script src="project.js"></script>
</body>
</html>
